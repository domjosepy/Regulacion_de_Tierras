<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Regulación de Tierras</title>

    {% load static %}

    <!-- Bootstrap 4.6.2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Tu CSS de Login -->
    <link href="{% static 'css/login.css' %}" rel="stylesheet">
</head>

<body class="login-container">

    <div class="login-wrapper">
        <div class="header">
            <i class="fa-solid fa-map-location-dot"></i>
            <div class="welcome-title">
                <div>Bienvenido al Sistema de</div>
                <div>Regulación de Tierras</div>
            </div>
        </div>

        <div class="login-box">
            <h3>Iniciar Sesión</h3>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Cerrar">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'login' %}" class="user position-relative">
                {% csrf_token %}
                
                <div class="form-group position-relative">
                    <label for="username">Usuario</label>
                    <i class="fas fa-user position-absolute" style="top: 71%; left: 15px; transform: translateY(-50%); color: #4e73df;"></i>
                    <input type="text" name="username" id="username" class="form-control pl-5" required>
                </div>

                <div class="form-group position-relative">
                    <label for="password">Contraseña</label>
                    <i class="fas fa-lock position-absolute" style="top: 71%; left: 15px; transform: translateY(-50%); color: #4e73df;"></i>
                    <input type="password" name="password" id="password" class="form-control pl-5" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword" style="position: absolute; left:330px; top: 71%; transform: translateY(-50%); cursor: pointer; color: #4e73df;"></i>
                </div>

                <div class="form-group form-check text-left">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Recordar mi contraseña</label>
                </div>

                <button type="submit" class="btn btn-login btn-block mt-3">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>

            </form>

            <a href="{% url 'password_reset' %}" class="forgot-password">¿Olvidaste tu contraseña?</a>
            <a href="{% url 'signup' %}" class="forgot-password">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/login.js' %}"></script>

</body>
</html>
